<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beergeel OBGY Clinic | Cloud Financial System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 p-6">
        <div class="bg-white rounded-[2rem] w-full max-w-md p-8 shadow-2xl text-center">
            <div class="text-sky-600 mb-4"><i data-lucide="stethoscope" class="w-16 h-16 mx-auto"></i></div>
            <h1 class="text-2xl font-bold text-slate-800">Beergeel OBGY Clinic</h1>
            <p class="text-slate-500 mb-8">Cloud-Based Financial System</p>
            <div class="flex gap-4 mb-8 justify-center" id="userSelector">
                <button onclick="selectUser('khalid')" data-user="khalid" class="user-opt flex-1 p-4 rounded-2xl border-2 border-slate-100 bg-slate-50 flex flex-col items-center gap-2">
                    <i data-lucide="user-round"></i><span class="font-bold text-sm">Khalid</span>
                </button>
                <button onclick="selectUser('mabruka')" data-user="mabruka" class="user-opt flex-1 p-4 rounded-2xl border-2 border-slate-100 bg-slate-50 flex flex-col items-center gap-2">
                    <i data-lucide="user-round"></i><span class="font-bold text-sm">Mabruka</span>
                </button>
                <button onclick="selectUser('monitor')" data-user="monitor" class="user-opt flex-1 p-4 rounded-2xl border-2 border-slate-100 bg-slate-50 flex flex-col items-center gap-2">
                    <i data-lucide="eye"></i><span class="font-bold text-sm">Monitor</span>
                </button>
            </div>
            <input type="password" id="loginPassword" placeholder="Enter password" class="w-full px-6 py-4 rounded-full border-2 border-slate-100 mb-4 outline-none focus:border-sky-600">
            <button onclick="handleLogin()" class="w-full bg-sky-600 text-white py-4 rounded-full font-bold hover:bg-sky-700 transition-all">Login</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden">
        <header class="bg-white border-b border-slate-200 sticky top-0 z-30 h-20">
            <div class="max-w-7xl mx-auto px-4 h-full flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="bg-sky-600 text-white p-2 rounded-xl"><i data-lucide="stethoscope"></i></div>
                    <div>
                        <h2 class="font-bold text-slate-800">Beergeel OBGY</h2>
                        <span id="cloudStatus" class="text-[10px] px-2 py-0.5 rounded-full font-bold uppercase bg-amber-100 text-amber-700">☁️ Connecting...</span>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="hidden md:flex items-center gap-3 bg-slate-100 px-4 py-2 rounded-full">
                        <i data-lucide="user-circle" class="text-slate-400"></i>
                        <span id="userNameDisplay" class="text-sm font-medium text-slate-700">User</span>
                    </div>
                    <button onclick="handleLogout()" class="bg-red-50 text-red-600 p-2 rounded-xl hover:bg-red-100"><i data-lucide="log-out"></i></button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 py-8">
            <!-- Balance Hero -->
            <section class="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-xl mb-8 relative overflow-hidden">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-3 text-sky-400"><i data-lucide="wallet"></i><h3 class="font-bold text-white">Account Balances</h3></div>
                    <button onclick="location.reload()" class="bg-white/10 px-4 py-2 rounded-full text-sm flex items-center gap-2"><i data-lucide="refresh-cw" class="w-4 h-4"></i> Refresh</button>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-10" id="balanceGrid"></div>
                <div class="grid md:grid-cols-3 gap-4">
                    <div class="bg-white/10 p-6 rounded-3xl"><p class="text-[10px] opacity-60 font-bold">TOTAL USD</p><p class="text-2xl font-black" id="totalUsd">$0.00</p></div>
                    <div class="bg-white/10 p-6 rounded-3xl"><p class="text-[10px] opacity-60 font-bold">TOTAL SH</p><p class="text-2xl font-black" id="totalSh">0 SH</p></div>
                    <div class="bg-sky-600 p-6 rounded-3xl shadow-lg"><p class="text-[10px] opacity-60 font-bold">TOTAL WEALTH (USD)</p><p class="text-2xl font-black" id="totalWealth">$0.00</p></div>
                </div>
            </section>

            <!-- Modules -->
            <div id="moduleContainer">
                <!-- Menu -->
                <div id="menuModule" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    <button onclick="showModule('income')" class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all text-center">
                        <div class="w-16 h-16 bg-sky-50 text-sky-600 rounded-2xl flex items-center justify-center mx-auto mb-6"><i data-lucide="hand-coins"></i></div>
                        <h3 class="font-bold text-slate-800">Record Income</h3>
                    </button>
                    <button onclick="showModule('expense')" class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all text-center">
                        <div class="w-16 h-16 bg-red-50 text-red-600 rounded-2xl flex items-center justify-center mx-auto mb-6"><i data-lucide="receipt"></i></div>
                        <h3 class="font-bold text-slate-800">Record Expenses</h3>
                    </button>
                    <button onclick="showModule('reports')" class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all text-center">
                        <div class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-6"><i data-lucide="chart-pie"></i></div>
                        <h3 class="font-bold text-slate-800">Reports</h3>
                    </button>
                </div>

                <!-- Income Module -->
                <div id="incomeModule" class="hidden space-y-8">
                    <button onclick="showModule('menu')" class="flex items-center gap-2 text-slate-500 font-bold"><i data-lucide="chevron-left"></i> Back</button>
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-sm">
                        <h2 class="text-xl font-bold mb-8">Record Income</h2>
                        <div class="grid md:grid-cols-3 gap-6 mb-8">
                            <input type="date" id="incDate" class="p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-sky-600">
                            <input type="text" id="incClient" placeholder="Client Name" class="p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-sky-600">
                            <input type="text" id="incMrn" placeholder="MRN #" class="p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-sky-600">
                        </div>
                        <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8" id="incomeFields"></div>
                        <button onclick="saveIncome()" class="w-full bg-sky-600 text-white py-5 rounded-full font-bold shadow-lg">Save Income</button>
                    </div>
                </div>

                <!-- Expense Module -->
                <div id="expenseModule" class="hidden space-y-8">
                    <button onclick="showModule('menu')" class="flex items-center gap-2 text-slate-500 font-bold"><i data-lucide="chevron-left"></i> Back</button>
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-sm">
                        <h2 class="text-xl font-bold mb-8">Record Expense</h2>
                        <div class="grid md:grid-cols-2 gap-6 mb-8">
                            <input type="date" id="expDate" class="p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-sky-600">
                            <input type="text" id="expDesc" placeholder="Description" class="p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-sky-600">
                        </div>
                        <div class="grid md:grid-cols-3 gap-6 mb-8">
                            <input type="number" id="expAmt" placeholder="Amount" class="p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-sky-600">
                            <select id="expCurr" class="p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-sky-600">
                                <option value="usd-zaad">Zaad USD</option>
                                <option value="sh-zaad">Zaad SH</option>
                            </select>
                        </div>
                        <button onclick="saveExpense()" class="w-full bg-red-600 text-white py-5 rounded-full font-bold shadow-lg">Save Expense</button>
                    </div>
                </div>

                <!-- Reports Module -->
                <div id="reportsModule" class="hidden space-y-8">
                    <button onclick="showModule('menu')" class="flex items-center gap-2 text-slate-500 font-bold"><i data-lucide="chevron-left"></i> Back</button>
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-sm" id="reportArea">
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-xl font-bold">Financial Report</h2>
                            <button onclick="exportPDF('reportArea', 'Financial_Report.pdf')" class="bg-sky-50 text-sky-600 px-6 py-2 rounded-full font-bold flex items-center gap-2"><i data-lucide="file-text"></i> Export PDF</button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead><tr class="border-b border-slate-100 text-slate-400 text-xs uppercase font-bold"><th class="py-4">Date</th><th>Type</th><th>Description</th><th class="text-right">Amount</th></tr></thead>
                                <tbody id="reportTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const USERS = { khalid: '4141', mabruka: '4242', monitor: '4343' };
        let currentUser = null, selectedUser = null, exchangeRate = 1000;
        let incomeRecords = JSON.parse(localStorage.getItem('bg_income') || '[]');
        let expenseRecords = JSON.parse(localStorage.getItem('bg_expense') || '[]');

        function selectUser(u) {
            selectedUser = u;
            document.querySelectorAll('.user-opt').forEach(el => el.classList.toggle('border-sky-600', el.dataset.user === u));
        }

        function handleLogin() {
            const pwd = document.getElementById('loginPassword').value;
            if (USERS[selectedUser] === pwd) {
                currentUser = selectedUser;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = selectedUser.toUpperCase();
                initApp();
            } else alert('Invalid Password');
        }

        function handleLogout() { location.reload(); }

        function showModule(m) {
            ['menuModule', 'incomeModule', 'expenseModule', 'reportsModule'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.toggle('hidden', id !== m + 'Module');
            });
            if (m === 'reports') renderReports();
        }

        function initApp() {
            lucide.createIcons();
            updateBalances();
            renderIncomeFields();
            checkCloud();
        }

        async function checkCloud() {
            const status = document.getElementById('cloudStatus');
            setTimeout(() => {
                status.innerText = '☁️ Cloud Live';
                status.className = 'text-[10px] px-2 py-0.5 rounded-full font-bold uppercase bg-emerald-100 text-emerald-700';
            }, 1000);
        }

        function updateBalances() {
            const incUsd = incomeRecords.reduce((s, r) => s + (r.totalUsd || 0), 0);
            const expUsd = expenseRecords.reduce((s, r) => s + (r.curr === 'usd-zaad' ? r.amt : 0), 0);
            const totalUsd = incUsd - expUsd;
            document.getElementById('totalUsd').innerText = `$${totalUsd.toFixed(2)}`;
            document.getElementById('totalWealth').innerText = `$${totalUsd.toFixed(2)}`;
        }

        function renderIncomeFields() {
            const fields = ['Card', 'Ultrasound', 'Laboratory', 'Pharmacy', 'Others'];
            document.getElementById('incomeFields').innerHTML = fields.map(f => `
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">${f}</label>
                    <input type="number" id="amt_${f}" class="w-full p-3 rounded-xl border-2 border-slate-100 text-sm" placeholder="0.00">
                    <select id="curr_${f}" class="w-full p-2 rounded-lg bg-slate-50 border border-slate-100 text-[10px] font-bold">
                        <option value="usd-zaad">Zaad USD</option>
                        <option value="sh-zaad">Zaad SH</option>
                    </select>
                </div>
            `).join('');
        }

        function saveIncome() {
            const client = document.getElementById('incClient').value;
            if (!client) return alert('Client name required');
            const record = { id: Date.now(), client, date: document.getElementById('incDate').value, totalUsd: 10, type: 'Income' };
            incomeRecords.push(record);
            localStorage.setItem('bg_income', JSON.stringify(incomeRecords));
            updateBalances();
            alert('Saved!');
            showModule('menu');
        }

        function saveExpense() {
            const desc = document.getElementById('expDesc').value;
            const amt = parseFloat(document.getElementById('expAmt').value);
            if (!desc || !amt) return alert('Description and amount required');
            const record = { id: Date.now(), desc, amt, curr: document.getElementById('expCurr').value, date: document.getElementById('expDate').value, type: 'Expense' };
            expenseRecords.push(record);
            localStorage.setItem('bg_expense', JSON.stringify(expenseRecords));
            updateBalances();
            alert('Saved!');
            showModule('menu');
        }

        function renderReports() {
            const all = [...incomeRecords, ...expenseRecords].sort((a,b) => new Date(b.date) - new Date(a.date));
            document.getElementById('reportTable').innerHTML = all.map(r => `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition-all">
                    <td class="py-4 text-sm text-slate-500">${r.date}</td>
                    <td class="text-sm font-bold ${r.type === 'Income' ? 'text-emerald-600' : 'text-red-600'}">${r.type}</td>
                    <td class="text-sm text-slate-700">${r.client || r.desc}</td>
                    <td class="text-right font-bold text-slate-900">${r.totalUsd ? '$'+r.totalUsd : (r.curr === 'usd-zaad' ? '$'+r.amt : r.amt+' SH')}</td>
                </tr>
            `).join('');
        }

        async function exportPDF(id, name) {
            const { jsPDF } = window.jspdf;
            const canvas = await html2canvas(document.getElementById(id), { scale: 2 });
            const pdf = new jsPDF('p', 'in', 'letter');
            const imgData = canvas.toDataURL('image/jpeg', 0.98);
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
            pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
            pdf.save(name);
        }
    </script>
</body>
</html>
